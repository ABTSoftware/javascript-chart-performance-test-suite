<html lang="en-us">
    <head>
        <meta charset="utf-8" />
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
        <title>Performance Results - Charts</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            #charts-container {
                max-width: 900px;
                margin: 0 auto;
            }
            #filter-panel,
            #filter-panel-libs {
                max-width: 900px;
                margin-left: auto;
                margin-right: auto;
            }
            .chart-section {
                margin-bottom: 40px;
            }
            .chart-section h3 {
                margin-bottom: 8px;
            }
            .chart-div {
                width: 850px;
                height: 400px;
            }
            .legend-div {
                width: 850px;
                margin: 0;
                padding: 8px 0;
                background-color: rgb(249, 249, 249);
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                justify-content: center;
            }
            .legend-div .scichart__legend {
                background-color: transparent !important;
                margin: 0 !important;
            }
            .legend-div .scichart__legend > div {
                background-color: transparent !important;
                margin: 0 !important;
            }
            .no-data {
                width: 850px;
                height: 100px;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #f5f5f5;
                border: 1px solid #ddd;
                color: #999;
                font-style: italic;
            }
            #loading {
                text-align: center;
                padding: 40px;
                font-size: 18px;
                color: #666;
            }
        </style>
    </head>
    <body>
        <div class="page-header">
            <h1>Performance Results - Charts</h1>
            <nav class="page-nav">
                <a href="index.html">Test Suite</a>
            </nav>
        </div>
        <p>Each chart shows Average FPS per library across parameter configurations for a single test case.</p>
        <div id="filter-panel">
            <div id="resultSetFilters"><strong>Result Sets:</strong></div>
            <div id="chartTypeToggle">
                <strong>Chart Type:</strong>
                <label><input type="radio" name="chartType" value="line" checked /> Line</label>
                <label><input type="radio" name="chartType" value="column" /> Grouped Column</label>
            </div>
        </div>
        <div id="filter-panel-libs">
            <div id="libraryFilters"><strong>Libraries:</strong></div>
        </div>
        <div id="loading">Loading results and initialising charts...</div>
        <div id="charts-container"></div>
        <script src="shared.js"></script>
        <script src="scichart/lib/index.min.js"></script>
        <script src="charts.js"></script>
    </body>
</html>
