<html lang="en-us">
    <head>
        <meta charset="utf-8" />
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
        <title>Performance Results - Charts</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            #charts-container {
                max-width: 900px;
                margin: 0 auto;
            }
            .chart-section {
                margin-bottom: 40px;
            }
            .chart-section h3 {
                margin-bottom: 8px;
            }
            .chart-div {
                width: 850px;
                height: 400px;
            }
            .no-data {
                width: 850px;
                height: 100px;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #f5f5f5;
                border: 1px solid #ddd;
                color: #999;
                font-style: italic;
            }
            #loading {
                text-align: center;
                padding: 40px;
                font-size: 18px;
                color: #666;
            }
        </style>
    </head>
    <body>
        <nav style="margin-bottom: 10px">
            <a href="index.html" style="font-size: 14px">Back to Test Suite</a>
        </nav>
        <h1>Performance Results - Charts</h1>
        <p>Each chart shows Average FPS per library across parameter configurations for a single test case.</p>
        <div id="filter-panel">
            <div id="resultSetFilters"><strong>Result Sets:</strong></div>
            <div id="libraryFilters"><strong>Libraries:</strong></div>
        </div>
        <div id="loading">Loading results and initialising charts...</div>
        <div id="charts-container"></div>
        <script src="shared.js"></script>
        <script src="scichart/lib/index.min.js"></script>
        <script src="charts.js"></script>
